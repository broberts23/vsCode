name: documentation-copilot
description: AI-powered documentation agent that generates Azure DevOps wiki entries from Python source code analysis.
runtime: python_3_13
entry_point:
  - python
  - main.py
deploy_mode: code
dependency_resolution: remote_build
environment_variables:
  - AZURE_AI_PROJECT_ENDPOINT
  - AZURE_AI_CHAT_DEPLOYMENT
  - AZURE_DEVOPS_ORG_URL
  - AZURE_DEVOPS_PROJECT
  - AZURE_DEVOPS_WIKI_ID
  - AZURE_DEVOPS_PAT
  - TARGET_REPO_ROOT
