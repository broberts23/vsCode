# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: ai-foundry-starter-basic
services:
    documentation-copilot:
        project: ./
        host: azure.ai.agent
        language: python
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            deployments:
                - model:
                    format: DeepSeek
                    name: DeepSeek-V4-Flash
                    version: "2026-04-23"
                  name: DeepSeek-V4-Flash
                  sku:
                    capacity: 1
                    name: GlobalStandard
infra:
    provider: bicep
    path: ./infra
